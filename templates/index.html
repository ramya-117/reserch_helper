<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 AI Research Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .logo { text-align: center; margin-bottom: 30px; }
  .logo h1 { font-size: 28px; color: #1a1a2e; }
  .logo p { color: #666; margin-top: 6px; font-size: 14px; }
  label { font-weight: 600; color: #333; display: block; margin-bottom: 6px; font-size: 14px; }
  input[type=text], input[type=email] {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    transition: border 0.2s;
    outline: none;
    margin-bottom: 20px;
  }
  input:focus { border-color: #0f3460; }
  button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #0f3460, #e94560);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  button:hover { opacity: 0.92; transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  #status-box {
    display: none;
    margin-top: 25px;
    background: #f8f9ff;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #e0e7ff;
  }
  .status-header { font-weight: 700; color: #1a1a2e; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .spinner {
    width: 18px; height: 18px;
    border: 3px solid #e0e7ff;
    border-top: 3px solid #0f3460;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #log-container {
    background: #1a1a2e;
    border-radius: 8px;
    padding: 14px;
    max-height: 200px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 13px;
  }
  .log-line { color: #a8d8a8; padding: 2px 0; }
  .log-line.error { color: #ff6b6b; }
  #done-banner {
    display: none;
    margin-top: 16px;
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
    border-radius: 10px;
    padding: 14px 18px;
    font-weight: 600;
    text-align: center;
  }
  #error-banner {
    display: none;
    margin-top: 16px;
    background: #ffe0e0;
    color: #c0392b;
    border-radius: 10px;
    padding: 14px 18px;
    font-weight: 600;
    text-align: center;
  }
  .steps {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
    gap: 6px;
  }
  .step {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #aaa;
  }
  .step-icon { font-size: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔬 AI Research Agent</h1>
    <p>Enter a topic and get a full research paper emailed to you</p>
  </div>

  <div class="steps">
    <div class="step"><div class="step-icon">🔍</div>Search</div>
    <div class="step"><div class="step-icon">📖</div>Summarize</div>
    <div class="step"><div class="step-icon">📝</div>Outline</div>
    <div class="step"><div class="step-icon">✍️</div>Write</div>
    <div class="step"><div class="step-icon">📧</div>Email</div>
  </div>

  <label for="topic">Research Topic</label>
  <input type="text" id="topic" placeholder="e.g. Transformer models in NLP" />

  <label for="email">Your Email Address</label>
  <input type="email" id="email" placeholder="you@example.com" />

  <button id="run-btn" onclick="startResearch()">🚀 Generate Research Paper</button>

  <div id="status-box">
    <div class="status-header">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">Processing...</span>
    </div>
    <div id="log-container"></div>
    <div id="done-banner">🎉 Done! Check your inbox — research paper has been emailed to you.</div>
    <div id="error-banner"></div>
  </div>
</div>

<script>
let pollInterval = null;

async function startResearch() {
  const topic = document.getElementById("topic").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!topic || !email) {
    alert("Please enter both a research topic and email address.");
    return;
  }

  document.getElementById("run-btn").disabled = true;
  document.getElementById("run-btn").textContent = "⏳ Running...";
  document.getElementById("status-box").style.display = "block";
  document.getElementById("log-container").innerHTML = "";
  document.getElementById("done-banner").style.display = "none";
  document.getElementById("error-banner").style.display = "none";

  try {
    const res = await fetch("/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic, email })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    pollStatus(data.job_id);
  } catch (e) {
    showError("Failed to start: " + e.message);
  }
}

function pollStatus(jobId) {
  pollInterval = setInterval(async () => {
    const res = await fetch(`/status/${jobId}`);
    const data = await res.json();

    const logContainer = document.getElementById("log-container");
    logContainer.innerHTML = data.logs.map(l =>
      `<div class="log-line ${l.includes('❌') ? 'error' : ''}">${l}</div>`
    ).join("");
    logContainer.scrollTop = logContainer.scrollHeight;

    if (data.done) {
      clearInterval(pollInterval);
      document.getElementById("spinner").style.display = "none";

      if (data.status === "done") {
        document.getElementById("status-text").textContent = "✅ Complete!";
        document.getElementById("done-banner").style.display = "block";
        document.getElementById("run-btn").textContent = "🚀 Generate Another";
        document.getElementById("run-btn").disabled = false;
      } else {
        showError("Error: " + data.error);
      }
    }
  }, 2000);
}

function showError(msg) {
  document.getElementById("error-banner").textContent = msg;
  document.getElementById("error-banner").style.display = "block";
  document.getElementById("spinner").style.display = "none";
  document.getElementById("run-btn").textContent = "🚀 Generate Research Paper";
  document.getElementById("run-btn").disabled = false;
}
</script>
</body>
</html>
